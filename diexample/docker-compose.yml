version: '3.8'
services:
  app: 
    build:
      context: .
      dockerfile: diexample/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/mydb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: dltjdgh1234
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - db

  
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: dltjdgh1234
      MYSQL_DATABASE: mydb

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql


volumes:
  mysql_data:
