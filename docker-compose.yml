version: '3.8'
services:
  app: 
    build:
      context: .
      dockerfile: diexample/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/mydb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: dltjdgh1234
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - db


  
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: dltjdgh1234
      MYSQL_DATABASE: mydb

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql


  # three ways to connect
  # 1. Port connection: Host <-> container ex) Spring(local) -> kafka(Container)
  # 2. Docker connection: Container <> Container
  # 3. Local: Host <-> Host

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

    volumes:
      - kafka_data:/bitnami/kafka

    

volumes:
  mysql_data:
  kafka_data:



 


